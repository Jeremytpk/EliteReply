name: Deploy to Firebase Hosting on merge # <-- Notice 'on merge' in the name
on: push # <-- This workflow triggers on push (which includes merges to main)
permissions:
  checks: write
  contents: read
  pull-requests: write # or maybe just 'contents: write' for a merge deploy
jobs:
  build_and_deploy: # This might be the job name that failed before
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- START OF ADDITIONS ---

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or '18', consistent with your project

      - name: Install dependencies
        run: npm ci

      # --- END OF ADDITIONS ---

      - run: npm ci && npx expo export --platform web # Your build script, or just 'npx expo export --platform web' if npm ci is separate
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ELITEREPLY_BD74D }}
          projectId: elitereply-bd74d

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- START OF ADDITIONS ---

      - name: Set up Node.js
        # Use a stable Node.js version compatible with your project, e.g., 18 or 20
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or '18', check your local environment or package.json engines field

      - name: Install dependencies
        # 'npm ci' is preferred over 'npm install' in CI environments for faster and more reliable installs
        run: npm ci

      # --- END OF ADDITIONS ---

      - run: npx expo export --platform web
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ELITEREPLY_BD74D }}
          projectId: elitereply-bd74d
